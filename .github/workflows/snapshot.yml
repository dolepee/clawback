name: Snapshot refresh

# Rebuilds app/src/data/snapshot.json from a full-history chain scan and commits it,
# which triggers a Vercel redeploy. This keeps the public benchmark showing real
# season numbers without doing heavy getLogs at page-load time. Refresh after each
# claim/settle/reveal workflow, with an hourly schedule as a freshness backstop.
on:
  workflow_run:
    workflows: ["Cron Cycle", "Cron Resolve", "Cron Reveal"]
    types: [completed]
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      MANTLE_SEPOLIA_RPC_URL: ${{ secrets.MANTLE_SEPOLIA_RPC_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: agent/pnpm-lock.yaml
      - name: install agent deps (viem)
        run: pnpm install --frozen-lockfile
        working-directory: agent
      - name: build snapshot
        run: node scripts/build-snapshot.mjs
        working-directory: agent
      - name: commit snapshot if changed
        run: |
          git add app/src/data/snapshot.json
          if git diff --cached --quiet; then
            echo "snapshot unchanged, nothing to commit"
            exit 0
          fi
          git config user.name "clawback-bot"
          git config user.email "bot@clawback.local"
          git commit -m "chore(snapshot): refresh season snapshot"
          git pull --rebase --autostash origin main || true
          git push
