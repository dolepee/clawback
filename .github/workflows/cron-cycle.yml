name: Cron Cycle

on:
  schedule:
    - cron: "13 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      MANTLE_SEPOLIA_RPC_URL: ${{ secrets.MANTLE_SEPOLIA_RPC_URL }}
      CAT_AGENT_PRIVATE_KEY: ${{ secrets.CAT_AGENT_PRIVATE_KEY }}
      LOBSTER_AGENT_PRIVATE_KEY: ${{ secrets.LOBSTER_AGENT_PRIVATE_KEY }}
      PAYER_PRIVATE_KEY: ${{ secrets.PAYER_PRIVATE_KEY }}
      # V2 LLM persona. The cron skip-guard exits 0 cleanly when these are
      # unset, so this is safe to leave wired even before the wallet or
      # LLM provider key is configured.
      LLM_AGENT_PRIVATE_KEY: ${{ secrets.LLM_AGENT_PRIVATE_KEY }}
      BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
      BANKR_LLM_MODEL: ${{ secrets.BANKR_LLM_MODEL }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      LLM_REQUIRE_PROVIDER_SUCCESS: "1"
      LLM_SKIP_ON_PROVIDER_FAILURE: "1"
      # Elfa AI Phase II compute credit (sponsor). When ELFA_API_KEY is
      # set, agent/src/elfa.ts pulls real-time triggers into the LLM
      # prompt context. Without it, LlmScout falls back to Pyth +
      # Merchant Moe observation alone.
      ELFA_API_KEY: ${{ secrets.ELFA_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL: ${{ vars.TELEGRAM_CHANNEL }}
      ELFA_BASE_URL: ${{ secrets.ELFA_BASE_URL }}
      ELFA_SYMBOL: ${{ secrets.ELFA_SYMBOL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: agent/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile

      - name: balance preflight
        run: pnpm tsx src/cron/preflight.ts

      - name: commit catscout
        run: pnpm tsx src/cron/commit.ts cat-scout

      - name: commit lobster
        run: pnpm tsx src/cron/commit.ts lobster-rogue

      - name: commit llm-scout
        continue-on-error: true
        run: pnpm tsx src/cron/commit.ts llm-scout

      - name: unlock new claims
        run: pnpm tsx src/cron/unlock.ts

      - name: encrypt cron-private salts
        env:
          CRON_PRIVATE_KEY: ${{ secrets.CRON_PRIVATE_KEY }}
        run: |
          if [ -z "$CRON_PRIVATE_KEY" ]; then
            echo "::error::CRON_PRIVATE_KEY secret missing — cannot persist salts for reveal"
            exit 1
          fi
          if [ ! -d cron-private ]; then
            echo "no cron-private dir produced this run"
            exit 0
          fi
          find cron-private -type f -name "*.json" -print0 | while IFS= read -r -d '' f; do
            rel="${f#cron-private/}"
            out="cron-private-encrypted/${rel}.enc"
            mkdir -p "$(dirname "$out")"
            openssl enc -aes-256-cbc -pbkdf2 -salt -in "$f" -out "$out" -pass "env:CRON_PRIVATE_KEY"
            echo "encrypted $f -> $out"
          done

      - name: commit provenance
        working-directory: .
        run: |
          git config user.name "clawback-cron"
          git config user.email "cron@clawback.local"
          git add agent/cron-runs/ agent/cron-private-encrypted/
          if git diff --staged --quiet; then
            echo "no provenance changes"
          else
            git commit -m "cron provenance $(date -u +%Y-%m-%d)"
            git push
          fi
